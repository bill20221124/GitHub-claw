# Validates that every directory under .agents/skills/ contains a skill.md file.
name: Validate Skills

on:
  push:
    paths:
      - '.agents/skills/**'
  pull_request:
    paths:
      - '.agents/skills/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check each skill directory has a skill.md
        shell: bash
        run: |
          errors=0
          skills_dir=".agents/skills"

          if [ ! -d "$skills_dir" ]; then
            echo "No $skills_dir directory found — skipping."
            exit 0
          fi

          for skill_dir in "$skills_dir"/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="$skill_dir/skill.md"
            if [ ! -f "$skill_file" ]; then
              echo "ERROR: '$skill_name' is missing skill.md"
              errors=$((errors + 1))
            else
              echo "OK: $skill_name"
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo ""
            echo "$errors skill directory/directories are missing skill.md."
            exit 1
          fi

          echo "All skill.md files present."

      - name: Check skill front-matter
        shell: bash
        run: |
          fail=0
          shopt -s nullglob
          for f in .agents/skills/*/skill.md; do
            dir_name="$(basename "$(dirname "$f")")"
            # Skip scaffolding directories (prefix "_") and externally-managed skills.
            case "$dir_name" in
              _*|ui-ux-pro-max) continue ;;
            esac
            for key in id triggers outputs model_tier; do
              if ! grep -Eq "^${key}:" "$f"; then
                echo "MISSING front-matter key '$key' in $f"
                fail=1
              fi
            done
          done
          exit $fail

      - name: Check cognitive_mode and collab_tier fields
        shell: bash
        run: |
          fail=0
          shopt -s nullglob
          VALID_MODES="reflexive deliberative reflective"
          VALID_TIERS="suggest propose execute"

          for f in .agents/skills/*/skill.md; do
            dir_name="$(basename "$(dirname "$f")")"
            is_template=false
            case "$dir_name" in
              _*) is_template=true ;;
            esac

            for field in cognitive_mode collab_tier; do
              if ! grep -Eq "^${field}:" "$f"; then
                echo "MISSING field '${field}' in skill '${dir_name}' ($f)"
                fail=1
                continue
              fi

              if [ "$is_template" = "false" ]; then
                value=$(grep -E "^${field}:" "$f" | head -1 | awk -F: '{print $2}' | awk '{print $1}')
                case "$field" in
                  cognitive_mode)
                    case "$value" in
                      reflexive|deliberative|reflective) ;;
                      *) echo "INVALID cognitive_mode '${value}' in skill '${dir_name}' ($f)"; fail=1 ;;
                    esac
                    ;;
                  collab_tier)
                    case "$value" in
                      suggest|propose|execute) ;;
                      *) echo "INVALID collab_tier '${value}' in skill '${dir_name}' ($f)"; fail=1 ;;
                    esac
                    ;;
                esac
              fi
            done
          done
          exit $fail
